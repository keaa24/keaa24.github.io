<!DOCTYPE html>
<html>
<head>
  <base href="/myapps/anlik_esles/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Anlık Eşleş">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anlık Eşleş</title>
  <link rel="icon" href="assets/assets/logo.png">
  <link rel="manifest" href="manifest.json">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3520800149573354"
       crossorigin="anonymous"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    /* Reklam başlangıçta gizli, yüklenince JS gösterecek */
    #adsense-bottom-banner {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 60px;
      background: #ffffff;
      text-align: center;
      z-index: 999999;
      box-sizing: border-box;
      overflow: hidden;
    }
    #adsense-bottom-banner ins {
      width: 100% !important;
      height: 50px !important;
      display: block !important;
    }
    /* Reklam göründüğünde Flutter view'ı yukarı çek */
    body.ad-visible flutter-view {
      bottom: 60px !important;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <div id="adsense-bottom-banner">
    <ins class="adsbygoogle"
         style="display:inline-block;width:100%;height:50px"
         data-ad-client="ca-pub-3520800149573354"
         data-ad-slot="6195027818"></ins>
  </div>
  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
    // Reklam gerçekten yüklenince banner'ı göster ve Flutter'ı yukarı çek
    (adsbygoogle = window.adsbygoogle || []).push = (function(origPush) {
      return function() {
        var result = origPush.apply(this, arguments);
        setTimeout(function() {
          var ins = document.querySelector('#adsense-bottom-banner ins');
          if (ins && ins.getAttribute('data-ad-status') === 'filled') {
            document.getElementById('adsense-bottom-banner').style.display = 'block';
            document.body.classList.add('ad-visible');
          }
        }, 2000);
        return result;
      };
    })(window.adsbygoogle.push);
  </script>
</body>
</html>
